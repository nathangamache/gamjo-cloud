version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: gamjo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gamjo
      POSTGRES_USER: gamjo
      POSTGRES_PASSWORD: gamjo_dev_2026
    ports:
      - "5433:5432"
    volumes:
      - gamjo_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gamjo-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  gamjo_pgdata:
